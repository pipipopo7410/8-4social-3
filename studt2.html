<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社會科全能挑戰站 - 導師專屬版</title>
    <style>
        :root {
            --hist-bg: #fff5f5; --hist-accent: #e74c3c;
            --geo-bg: #f0fff4; --geo-accent: #27ae60;
            --civ-bg: #ebf8ff; --civ-accent: #2980b9;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #1e293b; margin-bottom: 10px; }
        .nav-main { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-hist { background: var(--hist-accent); color: white; }
        .btn-geo { background: var(--geo-accent); color: white; }
        .btn-civ { background: var(--civ-accent); color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .game-container { background: white; width: 90%; max-width: 800px; min-height: 400px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; display: none; flex-direction: column; align-items: center; }
        
        /* 歷史時間軸樣式 */
        .timeline { width: 100%; display: flex; justify-content: space-between; margin: 60px 0; border-bottom: 4px solid #cbd5e0; padding-bottom: 10px; position: relative; }
        .time-slot { width: 80px; height: 40px; border: 2px dashed #cbd5e0; position: relative; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #718096; }
        .time-label { position: absolute; top: -30px; font-weight: bold; color: var(--hist-accent); }
        .event-card { background: white; border: 2px solid var(--hist-accent); padding: 8px; border-radius: 5px; cursor: grab; font-size: 14px; margin: 5px; width: fit-content; }

        /* 地理填圖樣式 (簡化版) */
        .map-area { position: relative; width: 100%; height: 300px; background: #e2e8f0; border-radius: 10px; display: flex; flex-wrap: wrap; gap: 10px; padding: 20px; justify-content: center; }
        .drop-zone { width: 120px; height: 60px; border: 2px solid #94a3b8; border-radius: 8px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 13px; color: #475569; }

        /* 公民分類箱樣式 */
        .bin-container { display: flex; gap: 20px; margin-top: 30px; width: 100%; justify-content: space-around; }
        .bin { width: 30%; height: 120px; border: 3px solid var(--civ-accent); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; font-weight: bold; background: var(--civ-bg); }
        .scenario { background: #fff; border: 2px solid #2980b9; padding: 15px; border-radius: 50px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }

        .feedback { margin-top: 20px; font-weight: bold; height: 24px; }
        .drop-target { background: #edf2f7; border-style: solid; }
    </style>
</head>
<body>

    <h1>社會科互動學習挑戰</h1>
    <div class="nav-main">
        <button class="btn-hist" onclick="loadGame('history')">歷史：時間軸排序</button>
        <button class="btn-geo" onclick="loadGame('geography')">地理：位置歸位</button>
        <button class="btn-civ" onclick="loadGame('civics')">公民：行為能力分類</button>
    </div>

    <div id="game-box" class="game-container">
        <h2 id="game-title">請選擇模式</h2>
        <p id="game-desc"></p>
        <div id="game-content" style="width: 100%;"></div>
        <div id="draggable-items" style="display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; gap: 10px;"></div>
        <div class="feedback" id="feedback"></div>
        <button onclick="resetCurrentGame()" style="margin-top: 20px; background: #64748b; color: white;">重玩本關</button>
    </div>

    <script>
        const games = {
            history: {
                title: "歷史：民初大事時間軸",
                desc: "請將事件拖到正確的年份位置上",
                slots: [
                    { label: "1911年", id: "1911" },
                    { label: "1912年", id: "1912" },
                    { label: "1913年", id: "1913" },
                    { label: "1915年", id: "1915" },
                    { label: "1919年", id: "1919" }
                ],
                items: [
                    { text: "武昌起事", target: "1911" },
                    { text: "中華民國成立", target: "1912" },
                    { text: "二次革命", target: "1913" },
                    { text: "二十一條要求", target: "1915" },
                    { text: "五四運動", target: "1919" }
                ]
            },
            geography: {
                title: "地理：南亞與東南亞特徵",
                desc: "將特色標籤拖到正確的地理單元中",
                slots: [
                    { label: "德干高原", id: "deccan" },
                    { label: "馬六甲海峽", id: "malacca" },
                    { label: "喜馬拉雅山", id: "himalayas" },
                    { label: "印尼", id: "indonesia" }
                ],
                items: [
                    { text: "古老陸塊", target: "deccan" },
                    { text: "交通要衝", target: "malacca" },
                    { text: "板塊擠壓形成", target: "himalayas" },
                    { text: "熱帶雨林廣布", target: "indonesia" }
                ]
            },
            civics: {
                title: "公民：行為能力分類箱",
                desc: "判斷情境屬於哪種行為能力，並將其歸類",
                slots: [
                    { label: "無行為能力", id: "none" },
                    { label: "限制行為能力", id: "limited" },
                    { label: "完全行為能力", id: "full" }
                ],
                items: [
                    { text: "5歲小孩買糖果", target: "none" },
                    { text: "受監護宣告者", target: "none" },
                    { text: "國二學生買文具", target: "limited" },
                    { text: "15歲少年租機車", target: "limited" },
                    { text: "20歲青年辦貸款", target: "full" },
                    { text: "大二學生簽租約", target: "full" }
                ]
            }
        };

        let activeSubject = '';

        function loadGame(subject) {
            activeSubject = subject;
            const gameData = games[subject];
            const box = document.getElementById('game-box');
            box.style.display = 'flex';
            document.getElementById('game-title').innerText = gameData.title;
            document.getElementById('game-desc').innerText = gameData.desc;
            document.getElementById('feedback').innerText = '';
            
            // 建立放置區
            const content = document.getElementById('game-content');
            content.innerHTML = '';
            const slotContainer = document.createElement('div');
            slotContainer.className = (subject === 'civics') ? 'bin-container' : (subject === 'history' ? 'timeline' : 'map-area');
            
            gameData.slots.forEach(s => {
                const slot = document.createElement('div');
                slot.className = (subject === 'civics') ? 'bin' : (subject === 'history' ? 'time-slot' : 'drop-zone');
                slot.id = 'slot-' + s.id;
                slot.innerHTML = `<div class="time-label">${s.label}</div><span>請拖入此處</span>`;
                if(subject === 'civics') slot.innerHTML = `<div>${s.label}</div>`;
                
                slot.ondragover = e => e.preventDefault();
                slot.ondrop = e => handleDrop(e, s.id);
                slotContainer.appendChild(slot);
            });
            content.appendChild(slotContainer);

            // 建立可拖拽項目
            const itemBox = document.getElementById('draggable-items');
            itemBox.innerHTML = '';
            const shuffledItems = [...gameData.items].sort(() => Math.random() - 0.5);
            shuffledItems.forEach((item, index) => {
                const el = document.createElement('div');
                el.className = (subject === 'civics') ? 'scenario' : 'event-card';
                el.innerText = item.text;
                el.draggable = true;
                el.id = 'item-' + index;
                el.dataset.target = item.target;
                el.ondragstart = e => e.dataTransfer.setData('text', e.target.id);
                itemBox.appendChild(el);
            });
        }

        function handleDrop(e, slotId) {
            e.preventDefault();
            const itemId = e.dataTransfer.getData('text');
            const itemEl = document.getElementById(itemId);
            const feedback = document.getElementById('feedback');
            
            if (itemEl.dataset.target === slotId) {
                feedback.innerText = "✅ 正確！";
                feedback.style.color = "green";
                e.currentTarget.appendChild(itemEl);
                itemEl.draggable = false;
                itemEl.style.cursor = "default";
                checkWin();
            } else {
                feedback.innerText = "❌ 再試一次！";
                feedback.style.color = "red";
            }
        }

        function checkWin() {
            const remaining = document.getElementById('draggable-items').children.length;
            if (remaining === 0) {
                document.getElementById('feedback').innerText = "🎉 太棒了！這一科你已經完全掌握了！";
            }
        }

        function resetCurrentGame() {
            if(activeSubject) loadGame(activeSubject);
        }
    </script>
</body>
</html>
